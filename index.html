<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кликер с мини-играми и скинами</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1e2b3a, #0f1a24);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0e0;
            padding: 15px;
        }
        
        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
            max-height: 95vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .game-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .game-container::-webkit-scrollbar-track {
            background: #1e2f3b;
            border-radius: 10px;
        }
        
        .game-container::-webkit-scrollbar-thumb {
            background: #5a7e94;
            border-radius: 10px;
        }
        
        .balance {
            background: #2a3b4c;
            border-radius: 60px;
            padding: 15px 25px;
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid #ffd966;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 5px 0 #b38b40;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .balance h2 {
            margin: 0;
            font-size: 1.8rem;
            color: #ffd966;
            text-shadow: 2px 2px 0 #8b5e3c;
        }
        
        .energy-bar {
            background: #1e3a4a;
            border-radius: 30px;
            padding: 8px 20px;
            border: 2px solid #4caf92;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4caf92;
        }
        
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .nav button {
            background: #3d4f5e;
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 0 #1d2a33;
            border: 1px solid #5f7a91;
        }
        
        .nav button.active {
            background: #5f7a91;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #2c3e50;
        }
        
        .page {
            display: none;
            background: #243442;
            border-radius: 30px;
            padding: 20px;
            border: 2px solid #4a6172;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6), 0 8px 0 #17222b;
        }
        
        .page.active {
            display: block;
        }
        
        #clicker-page {
            text-align: center;
        }
        
        .click-button {
            background: none;
            border: none;
            padding: 0;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 15px 0 #b36b0e, 0 20px 25px rgba(0,0,0,0.5);
            transition: 0.07s;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #ffe68f;
            overflow: hidden;
            position: relative;
        }
        
        .click-button:active {
            transform: translateY(12px);
            box-shadow: 0 3px 0 #b36b0e, 0 15px 20px rgba(0,0,0,0.5);
        }
        
        .click-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.1s ease;
        }
        
        #staticImage {
            opacity: 1;
            z-index: 1;
        }
        
        #staticImage.hidden {
            opacity: 0;
        }
        
        #animatedImage {
            opacity: 0;
            z-index: 2;
        }
        
        #animatedImage.visible {
            opacity: 1;
        }
        
        .click-hint {
            font-size: 1.2rem;
            margin-top: 10px;
            background: #1e3a4a;
            padding: 5px 15px;
            border-radius: 30px;
            display: inline-block;
        }
        
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .shop-item {
            background: #1e2f3b;
            border-radius: 25px;
            padding: 20px 15px;
            border: 2px solid #5a7e94;
            box-shadow: inset 0 0 10px #0f1a1f, 0 6px 0 #0f1a1f;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .shop-item h3 {
            font-size: 1.4rem;
            margin: 5px 0;
            color: #ffd966;
        }
        
        .shop-item.premium {
            border-color: #ffd966;
            background: #2a3b4c;
        }
        
        .skin-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ffd966;
            margin: 10px 0;
            overflow: hidden;
            position: relative;
        }
        
        .skin-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .skin-preview .static-preview {
            opacity: 1;
        }
        
        .skin-preview .animated-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.1s ease;
        }
        
        .skin-preview:hover .animated-preview {
            opacity: 1;
        }
        
        .skin-preview:hover .static-preview {
            opacity: 0;
        }
        
        .price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd966;
            margin: 10px 0;
        }
        
        .skin-actions {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }
        
        .buy-btn {
            flex: 1;
            background: #4caf92;
            border: none;
            font-size: 1.2rem;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            color: #1e3a2b;
            cursor: pointer;
            box-shadow: 0 5px 0 #2a6b56;
            transition: 0.07s;
        }
        
        .buy-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #2a6b56;
        }
        
        .buy-btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 5px 0 #2a6b56;
            pointer-events: none;
        }
        
        .equip-btn {
            flex: 1;
            background: #ffaa44;
            border: none;
            font-size: 1.2rem;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            color: #4a3a1a;
            cursor: pointer;
            box-shadow: 0 5px 0 #b38b40;
            transition: 0.07s;
        }
        
        .equip-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #b38b40;
        }
        
        .equip-btn.active {
            background: #4caf92;
            color: #1e3a2b;
            box-shadow: 0 5px 0 #2a6b56;
            pointer-events: none;
        }
        
        .owned-badge {
            background: #4caf92;
            color: #1e3a2b;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .shop-section {
            margin-bottom: 30px;
        }
        
        .shop-section h2 {
            color: #ffd966;
            font-size: 1.6rem;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .minigames-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .minigame-banner {
            background: #2a3b4c;
            border-radius: 25px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid #5a7e94;
            box-shadow: 0 8px 0 #17222b;
        }
        
        .minigame-banner:hover {
            transform: translateY(-4px);
            border-color: #ffd966;
        }
        
        .minigame-banner.large {
            grid-column: span 2;
            padding: 30px 15px;
            background: linear-gradient(135deg, #4a6172, #2a3b4c);
        }
        
        .minigame-banner.large h2 {
            font-size: 3rem;
            margin: 0;
            color: #ffd966;
        }
        
        .minigame-banner h3 {
            font-size: 1.6rem;
            margin: 5px 0;
            color: #ffd966;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #243442;
            border-radius: 30px;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 3px solid #ffd966;
            box-shadow: 0 15px 0 #17222b;
        }
        
        .lilypad-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: clamp(4px, 2vw, 8px);
            margin: 20px auto;
            width: 100%;
            max-width: min(70vh, 400px);
            aspect-ratio: 1/2;
        }
        
        .lilypad-cell {
            aspect-ratio: 1;
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            background-image: url('list.png');
            border: 2px solid #4caf92;
            box-shadow: 0 4px 0 #2a6b56;
            position: relative;
            min-width: 30px;
            min-height: 30px;
        }
        
        .lilypad-cell.correct {
            background-image: url('correct.png') !important;
            border-color: #ffd966;
        }
        
        .lilypad-cell.memory {
            background-image: url('correct.png') !important;
            border-color: #ffaa44;
        }
        
        .lilypad-cell.start-cell {
            border-color: #4caf92;
            box-shadow: 0 0 0 3px #4caf92, 0 4px 0 #2a6b56;
            background-image: url('correct.png') !important;
        }
        
        .lilypad-cell.frog-on {
            position: relative;
        }
        
        .lilypad-cell.frog-on::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            background-image: var(--frog-skin);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            z-index: 10;
            transition: all 0.3s ease;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.5));
        }
        
        .lilypad-cell.frog-on.jumping::after {
            animation: frogJump 0.3s ease;
        }
        
        @keyframes frogJump {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -80%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        .lilypad-cell.frog-on.drowning::after {
            animation: frogDrown 0.8s ease forwards;
        }
        
        @keyframes frogDrown {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            30% { transform: translate(-50%, -20%) scale(0.8); opacity: 1; }
            70% { transform: translate(-50%, 20%) scale(0.4); opacity: 0.5; }
            100% { transform: translate(-50%, 40%) scale(0); opacity: 0; }
        }
        
        .lilypad-cell.flipping {
            animation: flip 0.4s ease;
        }
        
        .lilypad-cell.removed {
            animation: sinkAndFade 0.8s ease forwards;
            pointer-events: none;
        }
        
        @keyframes sinkAndFade {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            30% { transform: scale(0.8) rotate(-5deg); opacity: 0.8; }
            70% { transform: scale(0.3) rotate(5deg); opacity: 0.3; }
            100% { transform: scale(0) rotate(0deg); opacity: 0; }
        }
        
        @keyframes flip {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(90deg); }
            100% { transform: rotateY(0deg); }
        }
        
        .memory-timer {
            font-size: 2rem;
            color: #ffd966;
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .lilypad-info {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 1.2rem;
        }
        
        #lilypadMessage {
            text-align: center;
            font-size: 1.1rem;
            margin-top: 10px;
            min-height: 30px;
        }
        
        .result-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .result-overlay h2 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin: 0 0 20px 0;
            text-align: center;
        }
        
        .result-overlay.victory h2 {
            color: #4caf92;
            text-shadow: 0 0 20px #4caf92;
        }
        
        .result-overlay.defeat h2 {
            color: #f44336;
            text-shadow: 0 0 20px #f44336;
        }
        
        .result-overlay .reward {
            font-size: clamp(1.2rem, 4vw, 2rem);
            color: #ffd966;
            margin-bottom: 20px;
        }
        
        .result-overlay button {
            background: #4caf92;
            border: none;
            font-size: clamp(1rem, 3vw, 1.2rem);
            padding: 10px 30px;
            border-radius: 40px;
            font-weight: bold;
            color: #1e3a2b;
            cursor: pointer;
            box-shadow: 0 5px 0 #2a6b56;
            transition: 0.07s;
        }
        
        .result-overlay button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #2a6b56;
        }
        
        .water-splash {
            position: absolute;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1001;
            animation: splash 0.5s ease-out forwards;
        }
        
        @keyframes splash {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(2); opacity: 0.5; }
            100% { transform: scale(3); opacity: 0; }
        }
        
        .wordle-grid {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 4px;
            margin: 10px 0;
        }
        
        .wordle-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
        }
        
        .wordle-cell {
            aspect-ratio: 1;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 #00000080;
            transform: scale(0.9);
            animation: popIn 0.2s ease forwards;
            background-image: url('list.png');
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .wordle-cell.flipping {
            animation: flip 0.4s ease forwards;
        }
        
        .wordle-cell.correct {
            background-image: url('correct.png') !important;
        }
        
        .wordle-cell.present {
            background-image: url('place.png') !important;
        }
        
        .wordle-cell.absent {
            background-image: url('list.png') !important;
        }
        
        .wordle-input {
            display: flex;
            gap: 8px;
            margin: 15px 0 5px;
            flex-wrap: wrap;
        }
        
        .wordle-input input {
            flex: 2;
            min-width: 150px;
            padding: 10px;
            font-size: 1.3rem;
            text-transform: uppercase;
            background: #1e2f3b;
            border: 2px solid #4a6172;
            border-radius: 25px;
            color: white;
            text-align: center;
        }
        
        .wordle-input button {
            flex: 1;
            min-width: 100px;
            padding: 10px 15px;
            font-size: 1.2rem;
            background: #4caf92;
            border: none;
            border-radius: 25px;
            color: #1e3a2b;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 4px solid #2a6b56;
        }
        
        .floating-number {
            position: fixed;
            color: #ffd966;
            font-size: 1.8rem;
            font-weight: bold;
            pointer-events: none;
            z-index: 10001;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 2px 2px 0 #b36b0e;
        }
        
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-80px) scale(1.2); opacity: 0; }
        }
        
        .energy-notice {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #f44336;
            color: white;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 1.2rem;
            z-index: 10002;
            animation: fadeOut 2s forwards;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        .stats {
            font-size: 0.9rem;
            color: #a0b8cc;
            margin-top: 5px;
        }
        
        .cooldown-timer {
            font-size: 1.2rem;
            color: #ffaa44;
            margin-top: 10px;
            font-weight: bold;
        }
        
        @media (max-width: 600px) {
            .skin-actions {
                flex-direction: column;
            }
            
            .lilypad-grid {
                max-width: min(50vh, 300px);
            }
            
            .lilypad-cell {
                border-width: 1px;
                box-shadow: 0 2px 0 #2a6b56;
            }
        }
        
        @media (max-height: 700px) {
            .lilypad-grid {
                max-width: min(40vh, 300px);
            }
        }
    </style>
</head>
<body>
    <div id="clickAnimationContainer"></div>
    
    <div class="game-container">
        <div class="balance">
            <h2 id="balanceDisplay">0 монет</h2>
            <div class="energy-bar">⚡ <span id="energyDisplay">100</span></div>
        </div>

        <div class="nav">
            <button id="navClicker" class="active">Кликер</button>
            <button id="navShop">Магазин</button>
            <button id="navMinigames">Мини-игры</button>
        </div>

        <div id="clicker-page" class="page active">
            <button id="clickerBtn" class="click-button">
                <img src="idle.png" alt="Jabba static" id="staticImage">
                <img src="Jabba.gif" alt="Jabba animated" id="animatedImage">
            </button>
            <div class="click-hint" id="clickRewardHint">+1 за клик</div>
        </div>

        <div id="shop-page" class="page">
            <div class="shop-section">
                <h2>⚡ Улучшения</h2>
                <div class="shop-grid">
                    <div class="shop-item">
                        <h3>⚡ Энергия</h3>
                        <div>+50 энергии</div>
                        <div class="price">500</div>
                        <button class="buy-btn" id="buyEnergy">Купить</button>
                    </div>
                    <div class="shop-item">
                        <h3>⚡ Сила клика</h3>
                        <div>Уровень: <span id="clickLevel">0</span></div>
                        <div class="price"><span id="clickCost">100</span></div>
                        <button class="buy-btn" id="buyClickUpgrade">Купить</button>
                    </div>
                    <div class="shop-item">
                        <h3>⏳ Пассивный доход</h3>
                        <div>Уровень: <span id="passiveLevel">0</span></div>
                        <div class="price"><span id="passiveCost">500</span></div>
                        <button class="buy-btn" id="buyPassiveUpgrade">Купить</button>
                    </div>
                </div>
            </div>

            <div class="shop-section">
                <h2>🎭 Скины</h2>
                <div class="shop-grid" id="skinsContainer"></div>
            </div>
        </div>

        <div id="minigames-page" class="page">
            <div class="minigames-grid">
                <div class="minigame-banner large" id="wordleBanner">
                    <h2>WORDLE</h2>
                    <p>Отгадай слово из 5 букв и получи 50000 монет!</p>
                    <div class="cooldown-timer" id="wordleCooldown">⏳ Загрузка слов...</div>
                    <div class="stats" id="wordleStats"></div>
                </div>
                
                <div class="minigame-banner" id="lilypadGame">
                    <h3>🏞️ Кувшинки</h3>
                    <p>10 ⚡</p>
                </div>
                
                <div class="minigame-banner" id="mosquitoGame">
                    <h3>🦟 Комары</h3>
                    <p>5 ⚡</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Wordle Modal -->
    <div class="modal" id="wordleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>WORDLE</h2>
                <button class="close-btn" id="closeWordle">&times;</button>
            </div>
            <div id="wordleGame">
                <div class="wordle-grid" id="wordleGrid"></div>
                <div class="wordle-input">
                    <input type="text" id="wordleGuess" maxlength="5" placeholder="5 букв" autocomplete="off">
                    <button id="submitGuess">➡️</button>
                </div>
                <div id="wordleMessage"></div>
            </div>
        </div>
    </div>

    <!-- Lilypad Game Modal -->
    <div class="modal" id="lilypadModal">
        <div class="modal-content" style="position: relative;">
            <div class="modal-header">
                <h2>🏞️ Кувшинки</h2>
                <button class="close-btn" id="closeLilypad">&times;</button>
            </div>
            <div class="memory-timer" id="memoryTimer">3</div>
            <div class="lilypad-grid" id="lilypadGrid"></div>
            <div class="lilypad-info">
                <span>Шаг: <span id="lilypadStep">0/0</span></span>
                <span id="lilypadMessage"></span>
            </div>
            <div id="lilypadResult" class="result-overlay" style="display: none;"></div>
        </div>
    </div>

    <script>
        (function() {
            let balance = 0;
            let energy = 100;
            let clickUpgradeLevel = 0;
            let passiveUpgradeLevel = 0;
            
            let wordleWords = [];
            let wordleTarget = '';
            let wordleAttempts = [];
            let wordleLastPlay = 0;
            let wordleGameActive = false;
            let isRevealing = false;
            let wordsLoaded = false;
            let loadingError = false;
            
            // Lilypad game variables
            let lilypadPath = [];
            let lilypadCurrentStep = 0;
            let lilypadGameActive = false;
            let lilypadMemoryPhase = true;
            let lilypadCells = [];
            let currentFrogCell = null;
            let visitedCells = new Set();
            let gameResult = null;
            
            const SKINS = [
                {
                    id: 'default',
                    name: '🐸 Обычный',
                    static: 'idle.png',
                    animated: 'Jabba.gif',
                    price: 0,
                    owned: true
                },
                {
                    id: 'magic',
                    name: '✨ Магический',
                    static: 'magic.png',
                    animated: 'magic.gif',
                    price: 1000,
                    owned: false
                },
                {
                    id: 'black',
                    name: '🖤 Черный',
                    static: 'black.png',
                    animated: 'black.gif',
                    price: 50000,
                    owned: false
                },
                {
                    id: 'minecraft',
                    name: '⛏️ Майнкрафт',
                    static: 'minecraft.png',
                    animated: 'minecraft.gif',
                    price: 1000000,
                    owned: false
                }
            ];
            
            let currentSkin = 'default';

            const STORAGE_KEYS = {
                BALANCE: 'clickerBalance',
                CLICK_LEVEL: 'clickerClickLevel',
                PASSIVE_LEVEL: 'clickerPassiveLevel',
                ENERGY: 'clickerEnergy',
                WORDLE_LAST: 'wordleLastPlay',
                SKINS: 'clickerSkins',
                CURRENT_SKIN: 'clickerCurrentSkin'
            };

            function loadProgress() {
                balance = parseInt(localStorage.getItem(STORAGE_KEYS.BALANCE)) || 0;
                clickUpgradeLevel = parseInt(localStorage.getItem(STORAGE_KEYS.CLICK_LEVEL)) || 0;
                passiveUpgradeLevel = parseInt(localStorage.getItem(STORAGE_KEYS.PASSIVE_LEVEL)) || 0;
                energy = parseInt(localStorage.getItem(STORAGE_KEYS.ENERGY)) || 100;
                wordleLastPlay = parseInt(localStorage.getItem(STORAGE_KEYS.WORDLE_LAST)) || 0;
                
                const savedSkins = localStorage.getItem(STORAGE_KEYS.SKINS);
                if (savedSkins) {
                    const ownedSkins = JSON.parse(savedSkins);
                    SKINS.forEach(skin => {
                        if (ownedSkins.includes(skin.id)) {
                            skin.owned = true;
                        }
                    });
                }
                
                currentSkin = localStorage.getItem(STORAGE_KEYS.CURRENT_SKIN) || 'default';
            }

            function saveProgress() {
                localStorage.setItem(STORAGE_KEYS.BALANCE, balance);
                localStorage.setItem(STORAGE_KEYS.CLICK_LEVEL, clickUpgradeLevel);
                localStorage.setItem(STORAGE_KEYS.PASSIVE_LEVEL, passiveUpgradeLevel);
                localStorage.setItem(STORAGE_KEYS.ENERGY, energy);
                localStorage.setItem(STORAGE_KEYS.WORDLE_LAST, wordleLastPlay);
                
                const ownedSkins = SKINS.filter(skin => skin.owned).map(skin => skin.id);
                localStorage.setItem(STORAGE_KEYS.SKINS, JSON.stringify(ownedSkins));
                localStorage.setItem(STORAGE_KEYS.CURRENT_SKIN, currentSkin);
            }

            const balanceDisplay = document.getElementById('balanceDisplay');
            const energyDisplay = document.getElementById('energyDisplay');
            const staticImage = document.getElementById('staticImage');
            const animatedImage = document.getElementById('animatedImage');
            const clickRewardHint = document.getElementById('clickRewardHint');
            const animationContainer = document.getElementById('clickAnimationContainer');
            const cooldownElement = document.getElementById('wordleCooldown');
            const statsElement = document.getElementById('wordleStats');
            const skinsContainer = document.getElementById('skinsContainer');

            function createFloatingNumber(value, x, y, color = '#ffd966') {
                const div = document.createElement('div');
                div.className = 'floating-number';
                div.textContent = `+${value}`;
                div.style.left = x + 'px';
                div.style.top = y + 'px';
                div.style.color = color;
                animationContainer.appendChild(div);
                setTimeout(() => div.remove(), 1000);
            }

            function showEnergyNotice(message) {
                const notice = document.createElement('div');
                notice.className = 'energy-notice';
                notice.textContent = message;
                document.body.appendChild(notice);
                setTimeout(() => notice.remove(), 2000);
            }

            function getClickReward() {
                return 1 + 3 * clickUpgradeLevel;
            }

            function updateUI() {
                balanceDisplay.textContent = balance + ' монет';
                energyDisplay.textContent = energy;
                clickRewardHint.textContent = `+${getClickReward()} за клик`;
                
                document.getElementById('clickLevel').textContent = clickUpgradeLevel;
                document.getElementById('clickCost').textContent = 100 * (clickUpgradeLevel + 1);
                document.getElementById('passiveLevel').textContent = passiveUpgradeLevel;
                document.getElementById('passiveCost').textContent = 500 * (passiveUpgradeLevel + 1);
                
                document.getElementById('buyEnergy').disabled = balance < 500;
                document.getElementById('buyClickUpgrade').disabled = balance < (100 * (clickUpgradeLevel + 1));
                document.getElementById('buyPassiveUpgrade').disabled = balance < (500 * (passiveUpgradeLevel + 1));
                
                const timeSinceLast = Date.now() - wordleLastPlay;
                const cooldownLeft = Math.max(0, 60000 - timeSinceLast);
                
                if (loadingError) {
                    cooldownElement.textContent = '❌ Ошибка загрузки';
                } else if (!wordsLoaded) {
                    cooldownElement.textContent = '⏳ Загрузка слов...';
                } else if (wordleWords.length === 0) {
                    cooldownElement.textContent = '⚠️ Нет слов';
                } else if (cooldownLeft > 0) {
                    const seconds = Math.ceil(cooldownLeft / 1000);
                    cooldownElement.textContent = `⏳ ${seconds}с`;
                } else {
                    cooldownElement.textContent = '✅ Доступно';
                }
                
                statsElement.textContent = wordleWords.length ? `${wordleWords.length} слов в словаре` : '';
                
                applySkin(currentSkin);
                
                saveProgress();
            }

            async function loadWordsFromFile() {
                try {
                    cooldownElement.textContent = '⏳ Загрузка слов...';
                    loadingError = false;
                    
                    const response = await fetch('words.txt');
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const text = await response.text();
                    
                    const lines = text.split('\n');
                    
                    const rawWords = lines
                        .map(line => line.trim().toUpperCase())
                        .filter(word => {
                            if (word.length !== 5) return false;
                            return /^[А-ЯЁ]+$/.test(word);
                        });
                    
                    wordleWords = [...new Set(rawWords)];
                    
                    if (wordleWords.length === 0) {
                        cooldownElement.textContent = '⚠️ Нет слов';
                    } else {
                        wordsLoaded = true;
                    }
                    
                    updateUI();
                    
                } catch (error) {
                    loadingError = true;
                    cooldownElement.textContent = '❌ Ошибка';
                    statsElement.textContent = 'Не удалось загрузить words.txt';
                    
                    wordleWords = [
                        'МЫШКА', 'КОШКА', 'СОБАК', 'РУЧКА', 'ДВЕРЬ',
                        'НОЧКА', 'ВЕСНА', 'ОСЕНЬ', 'ГОРОД', 'РЕЧКА',
                        'ОЗЕРО', 'КНИГА', 'ПАРТА', 'ШКОЛА', 'ДОСКА',
                        'СТУЛО', 'СТОЛБ', 'ПОЛКА', 'ЛАМПА', 'ЧАШКА'
                    ];
                    wordsLoaded = true;
                    updateUI();
                }
            }

            function renderSkins() {
                skinsContainer.innerHTML = '';
                
                SKINS.forEach(skin => {
                    const skinElement = document.createElement('div');
                    skinElement.className = `shop-item ${skin.price > 0 ? 'premium' : ''}`;
                    skinElement.id = `skin-${skin.id}`;
                    
                    let statusHtml = '';
                    if (skin.owned) {
                        statusHtml = '<div class="owned-badge">Куплено</div>';
                    }
                    
                    let actionsHtml = '';
                    if (skin.id === 'default') {
                        actionsHtml = `
                            <div class="skin-actions">
                                <button class="equip-btn ${currentSkin === 'default' ? 'active' : ''}" 
                                    id="equip-${skin.id}" data-skin="${skin.id}">Надеть</button>
                            </div>
                        `;
                    } else {
                        if (skin.owned) {
                            actionsHtml = `
                                <div class="skin-actions">
                                    <button class="equip-btn ${currentSkin === skin.id ? 'active' : ''}" 
                                        id="equip-${skin.id}" data-skin="${skin.id}">Надеть</button>
                                </div>
                            `;
                        } else {
                            actionsHtml = `
                                <div class="skin-actions">
                                    <button class="buy-btn" id="buy-${skin.id}">Купить</button>
                                    <button class="equip-btn" id="equip-${skin.id}" 
                                        data-skin="${skin.id}" style="display: none;">Надеть</button>
                                </div>
                            `;
                        }
                    }
                    
                    skinElement.innerHTML = `
                        <h3>${skin.name}</h3>
                        <div class="skin-preview">
                            <img src="${skin.static}" alt="${skin.name}" class="static-preview" 
                                onerror="this.src='https://via.placeholder.com/100?text=No+image'">
                            <img src="${skin.animated}" alt="${skin.name} animated" class="animated-preview"
                                onerror="this.style.display='none'">
                        </div>
                        ${skin.price > 0 ? `<div class="price">${skin.price.toLocaleString()}</div>` : ''}
                        ${statusHtml}
                        ${actionsHtml}
                    `;
                    
                    skinsContainer.appendChild(skinElement);
                });
                
                SKINS.forEach(skin => {
                    if (skin.id !== 'default') {
                        const buyBtn = document.getElementById(`buy-${skin.id}`);
                        if (buyBtn) {
                            buyBtn.addEventListener('click', () => buySkin(skin.id));
                        }
                    }
                    
                    const equipBtn = document.getElementById(`equip-${skin.id}`);
                    if (equipBtn) {
                        equipBtn.addEventListener('click', () => equipSkin(skin.id));
                    }
                });
            }

            function buySkin(skinId) {
                const skin = SKINS.find(s => s.id === skinId);
                if (!skin || skin.owned) return;
                
                if (balance >= skin.price) {
                    balance -= skin.price;
                    skin.owned = true;
                    
                    const skinElement = document.getElementById(`skin-${skinId}`);
                    const buyBtn = document.getElementById(`buy-${skinId}`);
                    const equipBtn = document.getElementById(`equip-${skinId}`);
                    
                    if (buyBtn) buyBtn.style.display = 'none';
                    if (equipBtn) {
                        equipBtn.style.display = 'block';
                        equipBtn.classList.remove('active');
                    }
                    
                    const statusDiv = skinElement.querySelector('.skin-status');
                    if (statusDiv) {
                        statusDiv.innerHTML = '<div class="owned-badge">Куплено</div>';
                    }
                    
                    createFloatingNumber(skin.price, window.innerWidth/2, window.innerHeight/2, '#4caf92');
                    
                    updateUI();
                } else {
                    showEnergyNotice('Недостаточно монет!');
                }
            }

            function equipSkin(skinId) {
                const skin = SKINS.find(s => s.id === skinId);
                if (!skin || (!skin.owned && skinId !== 'default')) return;
                
                currentSkin = skinId;
                
                SKINS.forEach(s => {
                    const btn = document.getElementById(`equip-${s.id}`);
                    if (btn) {
                        if (s.id === currentSkin) {
                            btn.classList.add('active');
                        } else {
                            btn.classList.remove('active');
                        }
                    }
                });
                
                applySkin(skinId);
                saveProgress();
                
                updateFrogSkin();
            }

            function applySkin(skinId) {
                const skin = SKINS.find(s => s.id === skinId);
                if (skin) {
                    staticImage.src = skin.static;
                    animatedImage.src = skin.animated;
                }
            }
            
            function updateFrogSkin() {
                const skin = SKINS.find(s => s.id === currentSkin);
                if (skin) {
                    document.documentElement.style.setProperty('--frog-skin', `url('${skin.static}')`);
                }
            }

            function startWordle() {
                if (!wordsLoaded) {
                    showEnergyNotice('Слова ещё загружаются...');
                    return;
                }
                
                if (wordleWords.length === 0) {
                    showEnergyNotice('Нет доступных слов');
                    return;
                }
                
                const timeSinceLast = Date.now() - wordleLastPlay;
                if (timeSinceLast < 60000) {
                    const secondsLeft = Math.ceil((60000 - timeSinceLast) / 1000);
                    showEnergyNotice(`Подождите ${secondsLeft}с`);
                    return;
                }
                
                wordleTarget = wordleWords[Math.floor(Math.random() * wordleWords.length)];
                wordleAttempts = [];
                wordleGameActive = true;
                isRevealing = false;
                
                renderWordleGrid();
                document.getElementById('wordleGuess').value = '';
                document.getElementById('wordleGuess').disabled = false;
                document.getElementById('submitGuess').disabled = false;
                document.getElementById('wordleMessage').textContent = '';
                document.getElementById('wordleModal').classList.add('active');
                
                setTimeout(() => {
                    document.getElementById('wordleGuess').focus();
                }, 100);
            }

            function renderWordleGrid() {
                const grid = document.getElementById('wordleGrid');
                grid.innerHTML = '';
                
                for (let i = 0; i < 6; i++) {
                    const row = document.createElement('div');
                    row.className = 'wordle-row';
                    
                    for (let j = 0; j < 5; j++) {
                        const cell = document.createElement('div');
                        cell.className = 'wordle-cell';
                        
                        if (i < wordleAttempts.length) {
                            const attempt = wordleAttempts[i];
                            const letter = attempt.word[j];
                            cell.textContent = letter;
                            
                            if (attempt.result[j] === 'correct') {
                                cell.classList.add('correct');
                            } else if (attempt.result[j] === 'present') {
                                cell.classList.add('present');
                            } else {
                                cell.classList.add('absent');
                            }
                        }
                        
                        row.appendChild(cell);
                    }
                    
                    grid.appendChild(row);
                }
            }

            async function checkWordleGuess(guess) {
                if (isRevealing || !wordleGameActive) return;
                
                guess = guess.toUpperCase().trim();
                if (guess.length !== 5) {
                    document.getElementById('wordleMessage').textContent = 'Нужно 5 букв!';
                    return;
                }
                
                if (!wordleWords.includes(guess)) {
                    document.getElementById('wordleMessage').textContent = 'Нет в словаре';
                    return;
                }
                
                isRevealing = true;
                document.getElementById('wordleGuess').disabled = true;
                document.getElementById('submitGuess').disabled = true;
                
                const result = [];
                const targetArray = wordleTarget.split('');
                const guessArray = guess.split('');
                
                for (let i = 0; i < 5; i++) {
                    if (guessArray[i] === targetArray[i]) {
                        result[i] = 'correct';
                        targetArray[i] = null;
                        guessArray[i] = null;
                    }
                }
                
                for (let i = 0; i < 5; i++) {
                    if (guessArray[i] === null) continue;
                    
                    const index = targetArray.indexOf(guessArray[i]);
                    if (index !== -1) {
                        result[i] = 'present';
                        targetArray[index] = null;
                    } else {
                        result[i] = 'absent';
                    }
                }
                
                wordleAttempts.push({ word: guess, result });
                
                const currentRowIndex = wordleAttempts.length - 1;
                const rowCells = document.querySelectorAll('.wordle-row')[currentRowIndex].querySelectorAll('.wordle-cell');
                
                for (let i = 0; i < rowCells.length; i++) {
                    rowCells[i].textContent = guess[i];
                }
                
                for (let i = 0; i < rowCells.length; i++) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    
                    rowCells[i].classList.add('flipping');
                    
                    setTimeout(() => {
                        rowCells[i].classList.remove('flipping');
                        
                        if (result[i] === 'correct') {
                            rowCells[i].classList.add('correct');
                        } else if (result[i] === 'present') {
                            rowCells[i].classList.add('present');
                        } else {
                            rowCells[i].classList.add('absent');
                        }
                        
                        if (i === rowCells.length - 1) {
                            setTimeout(() => {
                                if (guess === wordleTarget) {
                                    balance += 50000;
                                    wordleLastPlay = Date.now();
                                    wordleGameActive = false;
                                    updateUI();
                                    document.getElementById('wordleMessage').textContent = '🎉 ПОБЕДА! +50000 🎉';
                                    
                                    for (let i = 0; i < 5; i++) {
                                        setTimeout(() => {
                                            const rect = document.querySelector('.modal-content').getBoundingClientRect();
                                            createFloatingNumber('50000', rect.left + rect.width/2, rect.top + rect.height/2, '#ffaa44');
                                        }, i * 100);
                                    }
                                    
                                    setTimeout(() => {
                                        document.getElementById('wordleModal').classList.remove('active');
                                    }, 2000);
                                    
                                } else if (wordleAttempts.length >= 6) {
                                    wordleLastPlay = Date.now();
                                    wordleGameActive = false;
                                    document.getElementById('wordleMessage').textContent = `😢 Слово: ${wordleTarget}`;
                                    setTimeout(() => {
                                        document.getElementById('wordleModal').classList.remove('active');
                                    }, 3000);
                                } else {
                                    isRevealing = false;
                                    document.getElementById('wordleGuess').disabled = false;
                                    document.getElementById('submitGuess').disabled = false;
                                    document.getElementById('wordleGuess').value = '';
                                    document.getElementById('wordleGuess').focus();
                                }
                            }, 200);
                        }
                    }, 200);
                }
            }

            // Lilypad Game Functions
            function generateLilypadPath() {
                const path = [];
                // Всегда начинаем в нижнем ряду (row 7)
                const startCol = Math.floor(Math.random() * 4);
                path.push({ row: 7, col: startCol });
                
                let currentRow = 7;
                let currentCol = startCol;
                
                // Генерируем путь до верхнего ряда (row 0)
                while (currentRow > 0) {
                    // Находим все возможные соседние клетки (только вверх, влево, вправо)
                    const possibleMoves = [];
                    
                    // Вверх - всегда возможно, если не на верхнем ряду
                    if (currentRow > 0) {
                        possibleMoves.push({ row: currentRow - 1, col: currentCol, dir: 'up' });
                    }
                    
                    // Влево
                    if (currentCol > 0) {
                        possibleMoves.push({ row: currentRow, col: currentCol - 1, dir: 'left' });
                    }
                    
                    // Вправо
                    if (currentCol < 3) {
                        possibleMoves.push({ row: currentRow, col: currentCol + 1, dir: 'right' });
                    }
                    
                    // Фильтруем ходы, которые уже были в пути
                    const availableMoves = possibleMoves.filter(move => 
                        !path.some(p => p.row === move.row && p.col === move.col)
                    );
                    
                    if (availableMoves.length === 0) {
                        // Если нет доступных ходов, пробуем вернуться на шаг назад
                        if (path.length > 1) {
                            path.pop();
                            const prev = path[path.length - 1];
                            currentRow = prev.row;
                            currentCol = prev.col;
                            continue;
                        } else {
                            break;
                        }
                    }
                    
                    // Выбираем случайный ход, но с предпочтением движения вверх (70% шанс, если доступно)
                    const upMove = availableMoves.find(m => m.dir === 'up');
                    
                    let selectedMove;
                    if (upMove && Math.random() < 0.7) {
                        selectedMove = upMove;
                    } else {
                        selectedMove = availableMoves[Math.floor(Math.random() * availableMoves.length)];
                    }
                    
                    path.push(selectedMove);
                    currentRow = selectedMove.row;
                    currentCol = selectedMove.col;
                    
                    // Ограничиваем длину пути, но гарантируем достижение верхнего ряда
                    if (path.length > 30) break;
                }
                
                // Убеждаемся, что последняя клетка в верхнем ряду
                const last = path[path.length - 1];
                if (last.row !== 0) {
                    // Добавляем прямые шаги вверх до верхнего ряда
                    for (let r = last.row - 1; r >= 0; r--) {
                        if (!path.some(p => p.row === r && p.col === last.col)) {
                            path.push({ row: r, col: last.col });
                        }
                    }
                }
                
                return path;
            }

            function showResult(isVictory) {
                const resultOverlay = document.getElementById('lilypadResult');
                
                if (isVictory) {
                    resultOverlay.innerHTML = `
                        <h2>🎉 ПОБЕДА! 🎉</h2>
                        <div class="reward">+10000 монет</div>
                        <button onclick="document.getElementById('lilypadModal').classList.remove('active')">Закрыть</button>
                    `;
                    resultOverlay.className = 'result-overlay victory';
                } else {
                    resultOverlay.innerHTML = `
                        <h2>💔 ПОРАЖЕНИЕ</h2>
                        <button onclick="document.getElementById('lilypadModal').classList.remove('active')">Закрыть</button>
                    `;
                    resultOverlay.className = 'result-overlay defeat';
                }
                
                resultOverlay.style.display = 'flex';
            }

            function createSplash(x, y) {
                const splash = document.createElement('div');
                splash.className = 'water-splash';
                splash.style.left = x + 'px';
                splash.style.top = y + 'px';
                document.getElementById('lilypadModal').appendChild(splash);
                setTimeout(() => splash.remove(), 500);
            }

            function renderLilypadGrid(showMemory = true) {
                const grid = document.getElementById('lilypadGrid');
                grid.innerHTML = '';
                lilypadCells = [];
                visitedCells.clear();
                
                updateFrogSkin();
                
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 4; col++) {
                        const cell = document.createElement('div');
                        cell.className = 'lilypad-cell';
                        cell.dataset.row = row;
                        cell.dataset.col = col;
                        
                        const pathIndex = lilypadPath.findIndex(p => p.row === row && p.col === col);
                        const isPathCell = pathIndex !== -1;
                        
                        if (showMemory && isPathCell) {
                            cell.classList.add('memory');
                        }
                        
                        if (pathIndex === 0) {
                            cell.classList.add('start-cell', 'frog-on');
                            currentFrogCell = cell;
                            visitedCells.add(`${row},${col}`);
                        }
                        
                        cell.addEventListener('click', () => handleLilypadClick(row, col));
                        grid.appendChild(cell);
                        lilypadCells.push(cell);
                    }
                }
                
                document.getElementById('lilypadStep').textContent = `0/${lilypadPath.length - 1}`;
                document.getElementById('lilypadResult').style.display = 'none';
            }

            function moveFrogToCell(cell, row, col) {
                if (currentFrogCell) {
                    currentFrogCell.classList.remove('frog-on', 'jumping', 'drowning');
                }
                cell.classList.add('frog-on', 'jumping');
                currentFrogCell = cell;
                visitedCells.add(`${row},${col}`);
                
                setTimeout(() => {
                    if (currentFrogCell) {
                        currentFrogCell.classList.remove('jumping');
                    }
                }, 300);
            }

            function startLilypadMemory() {
                let timeLeft = 3;
                const timerElement = document.getElementById('memoryTimer');
                lilypadMemoryPhase = true;
                lilypadGameActive = false;
                gameResult = null;
                
                renderLilypadGrid(true);
                
                const timer = setInterval(() => {
                    timeLeft--;
                    timerElement.textContent = timeLeft;
                    
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        timerElement.textContent = '0';
                        endLilypadMemory();
                    }
                }, 1000);
            }

            function endLilypadMemory() {
                lilypadMemoryPhase = false;
                lilypadGameActive = true;
                
                lilypadCells.forEach(cell => {
                    cell.classList.add('flipping');
                    cell.classList.remove('memory');
                    setTimeout(() => {
                        cell.classList.remove('flipping');
                    }, 400);
                });
                
                document.getElementById('lilypadMessage').textContent = 'Выберите следующую кувшинку!';
            }

            function handleLilypadClick(row, col) {
                if (!lilypadGameActive || lilypadMemoryPhase || gameResult) return;
                
                const currentPos = lilypadPath[lilypadCurrentStep];
                
                // Проверяем, не была ли эта клетка уже посещена
                const cellKey = `${row},${col}`;
                if (visitedCells.has(cellKey)) {
                    document.getElementById('lilypadMessage').textContent = '❌ Здесь уже были!';
                    return;
                }
                
                // Проверяем, соседняя ли это клетка (только по горизонтали или вертикали)
                const isAdjacent = (
                    (Math.abs(row - currentPos.row) === 1 && col === currentPos.col) ||
                    (Math.abs(col - currentPos.col) === 1 && row === currentPos.row)
                );
                
                if (!isAdjacent) {
                    document.getElementById('lilypadMessage').textContent = '❌ Можно ходить только по соседним клеткам!';
                    return;
                }
                
                // Проверяем, является ли эта клетка следующей в пути
                const nextStepIndex = lilypadCurrentStep + 1;
                if (nextStepIndex >= lilypadPath.length) return;
                
                const nextTarget = lilypadPath[nextStepIndex];
                
                if (row === nextTarget.row && col === nextTarget.col) {
                    // Правильный выбор
                    const cell = lilypadCells.find(c => c.dataset.row == row && c.dataset.col == col);
                    cell.classList.add('correct');
                    
                    moveFrogToCell(cell, row, col);
                    
                    lilypadCurrentStep = nextStepIndex;
                    document.getElementById('lilypadStep').textContent = `${lilypadCurrentStep}/${lilypadPath.length - 1}`;
                    
                    if (lilypadCurrentStep === lilypadPath.length - 1) {
                        // Победа
                        lilypadGameActive = false;
                        gameResult = 'victory';
                        balance += 10000;
                        updateUI();
                        
                        document.getElementById('lilypadMessage').textContent = '🎉 ПОБЕДА! +10000 🎉';
                        
                        for (let i = 0; i < 5; i++) {
                            setTimeout(() => {
                                const rect = document.querySelector('.modal-content').getBoundingClientRect();
                                createFloatingNumber('10000', rect.left + rect.width/2, rect.top + rect.height/2, '#ffaa44');
                            }, i * 100);
                        }
                        
                        setTimeout(() => {
                            showResult(true);
                        }, 500);
                    }
                } else {
                    // Неправильный выбор - поражение с анимацией падения
                    lilypadGameActive = false;
                    gameResult = 'defeat';
                    
                    // Анимация падения лягушки
                    if (currentFrogCell) {
                        currentFrogCell.classList.add('drowning');
                        
                        // Создаем брызги
                        const rect = currentFrogCell.getBoundingClientRect();
                        const modalRect = document.querySelector('#lilypadModal .modal-content').getBoundingClientRect();
                        createSplash(rect.left - modalRect.left + rect.width/2, rect.top - modalRect.top + rect.height/2);
                    }
                    
                    // Анимация исчезновения неправильной кувшинки
                    const wrongCell = lilypadCells.find(c => c.dataset.row == row && c.dataset.col == col);
                    if (wrongCell) {
                        wrongCell.classList.add('removed');
                    }
                    
                    document.getElementById('lilypadMessage').textContent = '💔 Лягушка упала в воду!';
                    
                    setTimeout(() => {
                        showResult(false);
                    }, 800);
                }
            }

            function startLilypadGame() {
                if (energy < 10) {
                    showEnergyNotice('Нужно 10 ⚡');
                    return;
                }
                
                energy -= 10;
                updateUI();
                
                lilypadPath = generateLilypadPath();
                lilypadCurrentStep = 0;
                visitedCells.clear();
                gameResult = null;
                
                document.getElementById('lilypadModal').classList.add('active');
                document.getElementById('memoryTimer').textContent = '3';
                document.getElementById('lilypadMessage').textContent = 'Запоминайте путь!';
                document.getElementById('lilypadResult').style.display = 'none';
                
                startLilypadMemory();
            }

            function startMosquitoGame() {
                if (energy < 5) {
                    showEnergyNotice('Нужно 5 ⚡');
                    return;
                }
                energy -= 5;
                updateUI();
                alert('Игра "Комары" в разработке!');
            }

            function showPage(page) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
                
                if (page === 'clicker') {
                    document.getElementById('clicker-page').classList.add('active');
                    document.getElementById('navClicker').classList.add('active');
                } else if (page === 'shop') {
                    document.getElementById('shop-page').classList.add('active');
                    document.getElementById('navShop').classList.add('active');
                    renderSkins();
                } else {
                    document.getElementById('minigames-page').classList.add('active');
                    document.getElementById('navMinigames').classList.add('active');
                }
            }

            // Event Listeners
            document.getElementById('navClicker').addEventListener('click', () => showPage('clicker'));
            document.getElementById('navShop').addEventListener('click', () => showPage('shop'));
            document.getElementById('navMinigames').addEventListener('click', () => showPage('minigames'));

            document.getElementById('wordleBanner').addEventListener('click', startWordle);
            document.getElementById('lilypadGame').addEventListener('click', startLilypadGame);
            document.getElementById('mosquitoGame').addEventListener('click', startMosquitoGame);

            document.getElementById('closeWordle').addEventListener('click', () => {
                document.getElementById('wordleModal').classList.remove('active');
            });

            document.getElementById('closeLilypad').addEventListener('click', () => {
                document.getElementById('lilypadModal').classList.remove('active');
            });

            document.getElementById('submitGuess').addEventListener('click', () => {
                const guess = document.getElementById('wordleGuess').value;
                checkWordleGuess(guess);
            });

            document.getElementById('wordleGuess').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const guess = document.getElementById('wordleGuess').value;
                    checkWordleGuess(guess);
                }
            });

            document.getElementById('wordleModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('wordleModal')) {
                    document.getElementById('wordleModal').classList.remove('active');
                }
            });

            document.getElementById('lilypadModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('lilypadModal')) {
                    document.getElementById('lilypadModal').classList.remove('active');
                }
            });

            let animationTimer = null;
            
            function showClickAnimation() {
                if (animationTimer) clearTimeout(animationTimer);
                staticImage.classList.add('hidden');
                animatedImage.classList.add('visible');
                animationTimer = setTimeout(() => {
                    staticImage.classList.remove('hidden');
                    animatedImage.classList.remove('visible');
                    animationTimer = null;
                }, 450);
            }

            document.getElementById('clickerBtn').addEventListener('click', (e) => {
                const reward = getClickReward();
                balance += reward;
                updateUI();
                showClickAnimation();
                createFloatingNumber(reward, e.clientX, e.clientY);
            });

            document.getElementById('buyClickUpgrade').addEventListener('click', () => {
                const cost = 100 * (clickUpgradeLevel + 1);
                if (balance >= cost) {
                    balance -= cost;
                    clickUpgradeLevel++;
                    updateUI();
                }
            });

            document.getElementById('buyPassiveUpgrade').addEventListener('click', () => {
                const cost = 500 * (passiveUpgradeLevel + 1);
                if (balance >= cost) {
                    balance -= cost;
                    passiveUpgradeLevel++;
                    updateUI();
                }
            });

            document.getElementById('buyEnergy').addEventListener('click', () => {
                if (balance >= 500) {
                    balance -= 500;
                    energy += 50;
                    updateUI();
                }
            });

            setInterval(() => {
                if (passiveUpgradeLevel > 0) {
                    balance += passiveUpgradeLevel;
                    updateUI();
                }
            }, 1000);

            loadProgress();
            updateUI();
            renderSkins();
            loadWordsFromFile();

            staticImage.addEventListener('error', function() {
                this.src = 'https://via.placeholder.com/200x200?text=idle.png';
            });

            animatedImage.addEventListener('error', function() {
                this.style.display = 'none';
            });

            window.addEventListener('load', () => {
                console.log('Страница загружена');
            });
        })();
    </script>
</body>
</html>
